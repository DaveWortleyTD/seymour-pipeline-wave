name: Fetch River Level

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # allow manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Fetch and extract river level
        run: |
          curl -sf 'https://info.metrovancouver.org/jwup/Charts/SeymourRiverLevel/data.txt' \
            -o /tmp/river.json
          node -e "
            const d      = JSON.parse(require('fs').readFileSync('/tmp/river.json'));
            const series = d.dataSeries[0];
            const total  = series.data.length;
            // Keep last 72 h = 288 points at 15-min intervals
            const keep   = Math.min(288, total);
            const slice  = series.data.slice(total - keep);
            // Metro Vancouver timestamps are BC local time (UTC-7); append offset so JS parses correctly
            const t0     = new Date(d.startTime + '-07:00').getTime() + (total - keep) * series.pointInterval * 60000;
            const out = {
              current:         slice[slice.length - 1],
              max:             series.max,
              fetched:         new Date().toISOString(),
              startTime:       new Date(t0).toISOString(),
              intervalMinutes: series.pointInterval,
              values:          slice,
            };
            require('fs').writeFileSync('river-cache.json', JSON.stringify(out));
          "

      - name: Commit if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add river-cache.json
          git diff --staged --quiet || git commit -m 'chore: update river level cache'
          git push
